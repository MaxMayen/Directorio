<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lenguajes de Programacion</title>
    <style>

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #a9a9a9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 40px 5%; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

                                                           /* DEBO DEJAR DE HACER ESTO A LAS 3 AM */

        h1 {
            color: #ffe4c4;
            border-bottom: 2px solid #a9a9a9;
            padding-bottom: 10px;
            font-size: 2rem;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        p {
            color: #a9a9a9;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
        }

        .menu-container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn-enlace {
            display: block;
            background-color: #696969;
            color: #ffffff;
            text-decoration: none;
            padding: 15px 20px;
            border: 1px solid #ffffff;
            border-radius: 4px;
            font-weight: bold;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-enlace:hover {
            background-color: #ffffff;
            color: #000000;
            border-color: #ffffff;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            body {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.5rem;
            }

            p {
                font-size: 0.9rem;
                margin-bottom: 25px;
            }

            .btn-enlace {
                padding: 12px 15px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <h1>CENTRAL DE REFERENCIAS</h1>
    <p>Selecciona el modulo de apuntes para redirigir al acordeon correspondiente.</p>

    <div class="menu-container">
        <a href="https://maxmayen.github.io/C-digos-y-Funciones/" class="btn-enlace">1. HTML5</a>
        <a href="https://maxmayen.github.io/Creacion/" class="btn-enlace">2. CSS</a>
        <a href="https://maxmayen.github.io/JavaScript/" class="btn-enlace">3. JAVA SCRIPT</a>
        <a href="https://maxmayen.github.io/CMD/" class="btn-enlace">4. CMD WINDOWS</a>
        <a href="https://maxmayen.github.io/Java/" class="btn-enlace">5. JAVA</a>
        <a href="https://maxmayen.github.io/Python/" class="btn-enlace">6. PYTHON</a>
    </div>

</body>
</html>
